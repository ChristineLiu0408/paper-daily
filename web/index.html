<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="description" content="Deterministic AI and social research feed." />
    <title>AI &amp; Social Research Feed</title>
    <link rel="stylesheet" href="./styles.css?v=research-dashboard-1" />
  </head>
  <body>
    <header class="site-header">
      <div class="header-inner">
        <a class="brand" href="./" aria-label="Research Feed 首页">
          <span class="brand-mark" aria-hidden="true">RF</span>
          <span>
            <strong>AI &amp; Social Research Feed</strong>
            <small>Deterministic paper watch</small>
          </span>
        </a>
        <nav class="header-actions" aria-label="项目链接">
          <a href="https://github.com/ChristineLiu0408/paper-daily/actions" target="_blank" rel="noreferrer">Actions</a>
          <a href="https://github.com/ChristineLiu0408/paper-daily" target="_blank" rel="noreferrer">Repository</a>
        </nav>
      </div>
    </header>

    <main>
      <section class="overview-band" aria-labelledby="pageTitle">
        <div class="page-width overview-grid">
          <div>
            <p class="eyebrow">Research monitoring</p>
            <h1 id="pageTitle">本期研究监测</h1>
            <p id="statusLine" class="status-line">正在读取已生成的研究报告。</p>
          </div>
          <div class="run-note">
            <span>仅基于标题的确定性筛选</span>
            <a href="#candidates">查看候选论文</a>
          </div>
        </div>
      </section>

      <section class="page-width metrics" aria-label="本期统计">
        <div class="metric">
          <span class="metric-label">最新报告</span>
          <strong id="reportCount">0</strong>
        </div>
        <div class="metric high-metric">
          <span class="metric-label">High relevance</span>
          <strong id="highCount">0</strong>
        </div>
        <div class="metric ai-metric">
          <span class="metric-label">AI-related only</span>
          <strong id="aiCount">0</strong>
        </div>
        <div class="metric">
          <span class="metric-label">失败来源</span>
          <strong id="failedCount">0</strong>
        </div>
      </section>

      <section class="page-width section-block" aria-labelledby="watchTitle">
        <div class="section-heading">
          <div>
            <p class="eyebrow">Latest runs</p>
            <h2 id="watchTitle">三个 Watch</h2>
          </div>
          <span id="watchSummary" class="quiet-text"></span>
        </div>
        <div id="watchGrid" class="watch-grid"></div>
      </section>

      <section class="page-width visual-grid" aria-label="结果分布">
        <article class="visual-panel">
          <div class="section-heading compact-heading">
            <div>
              <p class="eyebrow">High and AI candidates</p>
              <h2>研究主题分布</h2>
            </div>
          </div>
          <div id="topicChart" class="bar-chart"></div>
        </article>
        <article class="visual-panel">
          <div class="section-heading compact-heading">
            <div>
              <p class="eyebrow">Candidate sources</p>
              <h2>来源分布</h2>
            </div>
          </div>
          <div id="sourceChart" class="bar-chart"></div>
        </article>
      </section>

      <section id="candidates" class="page-width section-block candidates-section" aria-labelledby="candidateTitle">
        <div class="section-heading candidate-heading">
          <div>
            <p class="eyebrow">Reading queue</p>
            <h2 id="candidateTitle">候选论文</h2>
          </div>
          <span id="candidateCount" class="quiet-text">0 篇</span>
        </div>
        <div class="filters" aria-label="候选筛选">
          <label>
            <span>Watch</span>
            <select id="watchFilter"></select>
          </label>
          <label>
            <span>Relevance</span>
            <select id="relevanceFilter">
              <option value="all">High 与 AI</option>
              <option value="high">High relevance</option>
              <option value="AI">AI-related only</option>
            </select>
          </label>
          <label>
            <span>Topic</span>
            <select id="topicFilter"></select>
          </label>
          <label class="search-field">
            <span>搜索</span>
            <input id="searchInput" type="search" placeholder="标题、来源或关键词" />
          </label>
        </div>
        <div id="candidateList" class="candidate-list"></div>
      </section>
    </main>

    <template id="watchTemplate">
      <article class="watch-card">
        <div class="watch-card-head">
          <span class="watch-frequency"></span>
          <span class="watch-period"></span>
        </div>
        <h3 class="watch-name"></h3>
        <p class="watch-meta"></p>
        <div class="watch-stats"></div>
        <div class="watch-links"></div>
      </article>
    </template>

    <template id="candidateTemplate">
      <article class="candidate-row">
        <div class="candidate-main">
          <div class="candidate-meta">
            <span class="relevance-badge"></span>
            <span class="topic-badge"></span>
            <span class="candidate-watch"></span>
          </div>
          <h3><a class="candidate-title" target="_blank" rel="noreferrer"></a></h3>
          <p class="candidate-source"></p>
          <div class="term-line">
            <span class="ai-terms"></span>
            <span class="social-terms"></span>
          </div>
        </div>
      </article>
    </template>

    <script src="./app.js?v=research-dashboard-1"></script>
  </body>
</html>
