name: Paper Watch

on:
  schedule:
    # UTC Sunday 22:00 = Australia/Perth Monday 06:00.
    - cron: "0 22 * * 0"
    # UTC day 1 00:00 = Australia/Perth day 1 08:00.
    - cron: "0 0 1 * *"
  workflow_dispatch:
    inputs:
      watch:
        description: "Watch to run"
        required: false
        default: "all"
        type: choice
        options:
          - all
          - monthly-applied-ai-journal-watch
          - monthly-top-psychology-journal-watch
          - weekly-conference-preprint-watch
      since_days:
        description: "Lookback window in days"
        required: false
        default: "7"

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: paper-watch
  cancel-in-progress: false

jobs:
  weekly-watch:
    if: github.event_name == 'schedule' && github.event.schedule == '0 22 * * 0'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: python -m pip install -r requirements.txt
      - name: Run weekly preprint watch
        run: python scripts/collect_watch.py --watch weekly-conference-preprint-watch --source-types preprint,rolling_journal --since-days 7 --report-suffix preprints
      - name: Commit dated reports
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add web/reports
          git diff --cached --quiet || git commit -m "Add weekly paper watch reports"
          git push
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: web
      - uses: actions/deploy-pages@v4

  monthly-watch:
    if: github.event_name == 'schedule' && github.event.schedule == '0 0 1 * *'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: python -m pip install -r requirements.txt
      - name: Run monthly applied AI journal watch
        run: python scripts/collect_watch.py --watch monthly-applied-ai-journal-watch --since-days 31
      - name: Run monthly top psychology journal watch
        run: python scripts/collect_watch.py --watch monthly-top-psychology-journal-watch --since-days 31
      - name: Run monthly main-conference watch
        run: python scripts/collect_watch.py --watch weekly-conference-preprint-watch --source-types conference --since-days 31 --report-suffix conferences
      - name: Commit dated reports
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add web/reports
          git diff --cached --quiet || git commit -m "Add monthly paper watch report"
          git push
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: web
      - uses: actions/deploy-pages@v4

  manual-watch:
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: python -m pip install -r requirements.txt
      - name: Run selected watch
        run: python scripts/collect_watch.py --watch "${{ inputs.watch }}" --since-days "${{ inputs.since_days }}"
      - name: Commit dated reports
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add web/reports
          git diff --cached --quiet || git commit -m "Add manual paper watch report"
          git push
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: web
      - uses: actions/deploy-pages@v4
